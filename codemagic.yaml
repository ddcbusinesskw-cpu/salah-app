workflows:
  android-release:
    name: Android Release (AAB)
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    environment:
      android_signing:
        - noor_keystore
      vars:
        PACKAGE_NAME: com.ddcbusiness.noor
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Print signing certificate fingerprints (SHA-1 & SHA-256)
        script: |
          echo "================================================================"
          echo "  بصمات شهادة التوقيع — أضفها في Firebase Console > Project Settings > Your apps > Android"
          echo "================================================================"
          keytool -list -v \
            -keystore "$CM_KEYSTORE_PATH" \
            -storepass "$CM_KEYSTORE_PASSWORD" \
            -alias "$CM_KEY_ALIAS" \
            2>/dev/null | grep -E "SHA1:|SHA256:"
          echo "================================================================"
      - name: Prepare www
        script: npm run prepare:www
      - name: Capacitor sync
        script: npx cap sync android
      - name: Build release AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

  ios-release:
    name: iOS Release (IPA → TestFlight)
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ddcbusiness.noor
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
    scripts:
      - name: Install Node dependencies
        script: npm ci
      - name: Prepare www
        script: npm run prepare:www
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install CocoaPods
        script: cd ios/App && pod install --repo-update
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        expire_build_submitted_for_review: true
